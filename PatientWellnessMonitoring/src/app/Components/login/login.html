<div
  class="container p-5 flex flex-col align-top min-h-[60vh] w-[60vw] my-20 mx-auto bg-[#ebe6d5] rounded-lg shadow-lg"
>
  <!-- Title -->
  <h2 class="bg-white text-xl font-semibold flex justify-center py-4 shadow-sm">Sign In</h2>

  <!-- Role Selector -->
  <div class="w-full h-[10%] flex justify-center items-center mt-4">
    <select
      [(ngModel)]="selectedForm"
      class="text-amber-200 bg-black w-[150px] text-center h-[40px] rounded border border-amber-50"
    >
      <option value="Form1" class="bg-black">Doctor</option>
      <option value="Form2" class="bg-black">Patient</option>
    </select>
  </div>

  <!-- Doctor Login Form -->
  <form
    *ngIf="selectedForm === 'Form1'"
    [formGroup]="doctorLoginForm"
    (ngSubmit)="onDoctorSubmit()"
    class="grid grid-cols-1 gap-4 p-4"
  >
    <fieldset class="border-2 bg-white p-1 border-[#00B050] h-[50px]">
      <legend class="text-[10px] text-[#00B050]">Phone Number</legend>
      <input
        type="tel"
        formControlName="phone"
        class="w-full p-[4px] text-sm text-black focus:outline-none"
      />
    </fieldset>
    <div
      class="text-red-500 text-xs"
      *ngIf="doctorLoginForm.get('phone')?.invalid && doctorLoginForm.get('phone')?.touched"
    >
      Invalid Phone Number
    </div>

    <fieldset class="border-2 bg-white p-1 border-[#00B050] h-[50px]">
      <legend class="text-[10px] text-[#00B050]">Password</legend>
      <input
        type="password"
        formControlName="password"
        class="w-full p-[4px] text-sm text-black focus:outline-none"
      />
    </fieldset>
    <div
      class="text-red-500 text-xs"
      *ngIf="doctorLoginForm.get('password')?.invalid && doctorLoginForm.get('password')?.touched"
    >
      Password is required
    </div>

    <input
      type="submit"
      [disabled]="doctorLoginForm.invalid"
      class="p-2 bg-[#00B050] text-white w-28 mx-auto text-sm cursor-pointer rounded hover:bg-green-700 transition"
      value="Login"
    />
  </form>

  <!-- Patient Login Form -->
  <form
    *ngIf="selectedForm === 'Form2'"
    [formGroup]="patientLoginForm"
    (ngSubmit)="onPatientSubmit()"
    class="grid grid-cols-1 gap-4 p-4"
  >
    <fieldset class="border-2 bg-white p-1 border-[#00B050] h-[50px]">
      <legend class="text-[10px] text-[#00B050]">Phone Number</legend>
      <input
        type="tel"
        formControlName="phone"
        class="w-full p-[4px] text-sm text-black focus:outline-none"
      />
    </fieldset>
    <div
      class="text-red-500 text-xs"
      *ngIf="patientLoginForm.get('phone')?.invalid && patientLoginForm.get('phone')?.touched"
    >
      Invalid Phone Number
    </div>

    <fieldset class="border-2 bg-white p-1 border-[#00B050] h-[50px]">
      <legend class="text-[10px] text-[#00B050]">Password</legend>
      <input
        type="password"
        formControlName="password"
        class="w-full p-[4px] text-sm text-black focus:outline-none"
      />
    </fieldset>
    <div
      class="text-red-500 text-xs"
      *ngIf="patientLoginForm.get('password')?.invalid && patientLoginForm.get('password')?.touched"
    >
      Password is required
    </div>

    <input
      type="submit"
      [disabled]="patientLoginForm.invalid"
      class="p-2 bg-[#00B050] text-white w-28 mx-auto text-sm cursor-pointer rounded hover:bg-green-700 transition"
      value="Login"
    />
  </form>

  <!-- Message -->
  <p class="text-center text-sm mt-2">{{ msg }}</p>

  <!-- Sign Up Link -->
  <div class="text-center mt-4">
    <button
      (click)="goToSignUp()"
      class="underline text-blue-600 text-sm hover:text-blue-800 transition"
    >
      Don't have an account? Create an account here
    </button>
  </div>
</div>
