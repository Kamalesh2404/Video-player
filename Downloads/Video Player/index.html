<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Video Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column;
           align-items: center; justify-content: center; height: 100vh; }

    #player-wrapper {
      position: relative; width: 100%; max-width: 1280px;
      background: #111; border-radius: 8px; overflow: hidden;
    }

    #video-canvas { width: 100%; display: block; background: #000; }

    #controls {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; background: rgba(0,0,0,0.85);
    }

    #progress-bar {
      flex: 1; height: 5px; background: #444;
      border-radius: 3px; cursor: pointer; position: relative;
    }
    #progress-fill { height: 100%; background: #e50914;
                     border-radius: 3px; width: 0%; }

    button { background: none; border: none; color: #fff;
             cursor: pointer; font-size: 18px; padding: 4px 8px; }
    button:hover { color: #e50914; }

    #volume-slider { width: 80px; accent-color: #e50914; }
    #time-display { color: #ccc; font-size: 13px;
                    font-family: monospace; white-space: nowrap; }

    #audio-track-select {
      background: #222; color: #fff; border: 1px solid #444;
      border-radius: 4px; padding: 3px 6px; font-size: 12px;
    }

    #info-overlay {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.7); color: #0f0;
      font-family: monospace; font-size: 11px;
      padding: 6px 10px; border-radius: 4px;
      display: none; /* toggle with 'I' key */
    }

    #drop-zone {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      color: #888; font-size: 20px; font-family: sans-serif;
      border: 2px dashed #333; pointer-events: none;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="player-wrapper">
    <canvas id="video-canvas" height="720"></canvas>

    <div id="drop-zone">🎬 Drop any video file here</div>

    <div id="info-overlay" id="info-overlay">
      <div id="info-codec">Codec: —</div>
      <div id="info-res">Resolution: —</div>
      <div id="info-fps">FPS: —</div>
      <div id="info-audio">Audio: —</div>
      <div id="info-drop">Dropped Frames: 0</div>
    </div>

    <div id="controls">
      <button id="btn-open" title="Open File">📂</button>
      <button id="btn-play" title="Play/Pause">▶</button>
      <button id="btn-stop" title="Stop">⏹</button>

      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>

      <span id="time-display">0:00 / 0:00</span>

      <input type="range" id="volume-slider" min="0" max="1"
             step="0.01" value="1" title="Volume">

      <select id="audio-track-select" title="Audio Track">
        <option value="0">Audio Track 1</option>
      </select>

      <button id="btn-fullscreen" title="Fullscreen">⛶</button>
    </div>
  </div>

  <input type="file" id="file-input" accept="video/*" style="display:none">

  <!-- ffmpeg.wasm for universal format support -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js"></script>
  <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

  <script src="audio-engine.js"></script>
  <script src="renderer.js"></script>
  <script src="player.js"></script>
  <script src="ui.js"></script>
</body>
</html>
